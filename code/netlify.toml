[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

[[edge_functions]]
  path = "/api/locale"
  function = "locale"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Static export emits the generated OG card as an extensionless file —
# pin its content type so social scrapers render it as an image.
[[headers]]
  for = "/opengraph-image"
  [headers.values]
    Content-Type = "image/png"
